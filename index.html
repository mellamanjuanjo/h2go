const DAYS   = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const MONTHS_SHORT = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const CIRC = 502.65;

function todayKey() { return new Date().toISOString().slice(0,10); }
function dateKey(d) { return d.toISOString().slice(0,10); }
function fmtDate(d) { return `${DAYS[d.getDay()]}, ${d.getDate()} de ${MONTHS[d.getMonth()]}`; }

function getWeekDays() {
  const now = new Date();
  const dow  = now.getDay();
  const diff = dow === 0 ? -6 : 1 - dow;
  const mon  = new Date(now);
  mon.setDate(now.getDate() + diff);
  return Array.from({length:7}, (_,i) => { const d = new Date(mon); d.setDate(mon.getDate()+i); return d; });
}

function getMonthDays(year, month) {
  const days = [];
  const d = new Date(year, month, 1);
  while(d.getMonth() === month) { days.push(new Date(d)); d.setDate(d.getDate()+1); }
  return days;
}

function isAllowedHour(wakeWd, wakeWe) {
  const now = new Date();
  const h   = now.getHours() + now.getMinutes()/60;
  const dow = now.getDay();
  const wakeHour = (dow===0||dow===6) ? wakeWe : wakeWd;
  return h >= wakeHour && h < 22;
}

function H2Go() {
  const [tab,       setTab]       = useState('today');
  const [histMode,  setHistMode]  = useState('week');
  const [monthRef,  setMonthRef]  = useState(()=>{ const n=new Date(); return{y:n.getFullYear(),m:n.getMonth()}; });
  const [logs,      setLogs]      = useState({});
  const [goal,      setGoal]      = useState(2000);
  const [remindOn,  setRemindOn]  = useState(false);
  const [remindInt, setRemindInt] = useState(60);
  const [wakeWd,    setWakeWd]    = useState(9);
  const [wakeWe,    setWakeWe]    = useState(12);
  const [toast,     setToast]     = useState('');
  const [toastVis,  setToastVis]  = useState(false);
  const [flash,     setFlash]     = useState(null);
  const timerRef = useRef(null);

  useEffect(()=>{
    try{
      const l=localStorage.getItem('h2go_log'); if(l) setLogs(JSON.parse(l));
      const g=localStorage.getItem('h2go_goal'); if(g) setGoal(parseInt(g));
      setRemindOn(localStorage.getItem('h2go_remind')==='1');
      const ri=localStorage.getItem('h2go_interval'); if(ri) setRemindInt(parseInt(ri));
      const ww=localStorage.getItem('h2go_wakewd'); if(ww) setWakeWd(parseInt(ww));
      const we=localStorage.getItem('h2go_wakewe'); if(we) setWakeWe(parseInt(we));
    }catch(e){}
  },[]);

  const persist   = useCallback((k,v)=>{ try{localStorage.setItem(k,String(v));}catch(e){} },[]);
  const saveLogs  = useCallback((next)=>{ persist('h2go_log',JSON.stringify(next)); setLogs(next); },[persist]);
  const showToast = useCallback((msg)=>{ setToast(msg); setToastVis(true); setTimeout(()=>setToastVis(false),2400); },[]);

  useEffect(()=>{
    clearInterval(timerRef.current);
    if(!remindOn) return;
    timerRef.current = setInterval(()=>{
      const dayTotal=(logs[todayKey()]||[]).reduce((s,e)=>s+e.ml,0);
      if(dayTotal>=goal) return;
      if(isAllowedHour(wakeWd,wakeWe)) showToast('💧 ¡Recuerda beber agua!');
    }, remindInt*60*1000);
    return ()=>clearInterval(timerRef.current);
  },[remindOn,remindInt,wakeWd,wakeWe,goal,logs,showToast]);

  const addDrink = useCallback((ml,idx)=>{
    const k=todayKey();
    const time=new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
    const next={...logs,[k]:[...(logs[k]||[]),{ml,time}]};
    saveLogs(next);
    setFlash(idx); setTimeout(()=>setFlash(null),320);
    const total=next[k].reduce((s,e)=>s+e.ml,0);
    showToast(`+${ml} ml — Total: ${total} ml`);
    if(total>=goal&&total-ml<goal) setTimeout(()=>showToast('🎉 ¡Objetivo del día cumplido!'),900);
  },[logs,goal,saveLogs,showToast]);

  const deleteEntry=useCallback((i)=>{
    const k=todayKey(); const arr=[...(logs[k]||[])]; arr.splice(i,1);
    const next={...logs}; if(arr.length) next[k]=arr; else delete next[k]; saveLogs(next);
  },[logs,saveLogs]);

  const total    = (logs[todayKey()]||[]).reduce((s,e)=>s+e.ml,0);
  const pct      = Math.min(total/goal,1);
  const offset   = CIRC-pct*CIRC;
  const ringColor= pct>=1?'#3ab87a':'#4ba3e3';
  const totalLbl = total>=1000?(total/1000).toFixed(1).replace('.0','')+'L':String(total);
  const unitLbl  = total>=1000?'':' ml';
  const fmtMl    = v=>v>=1000?(v/1000).toFixed(1).replace('.0','')+'L':v?v+'ml':'—';
  const calcStats= totals=>({
    avg:   (f=>f.length?Math.round(f.reduce((a,b)=>a+b,0)/f.length):0)(totals.filter(v=>v>0)),
    best:  Math.max(...totals,0),
    daysOk:totals.filter(v=>v>=goal).length,
  });
  const streak=(()=>{ let s=0; const d=new Date(); while(true){ const k=dateKey(d); if((logs[k]||[]).reduce((a,b)=>a+b.ml,0)>=goal){s++;d.setDate(d.getDate()-1);}else break; } return s; })();
  const C={bg:'#07111f',bg2:'#0d1e35',bg3:'#112240',accent:'#4ba3e3',accent2:'#7ec8f7',dim:'#2a4a6e',soft:'#6a9bc3',white:'#e8f4ff',green:'#3ab87a'};

  const renderBars=(days,totals,maxBar,outerH,showNum)=>days.map((d,i)=>{
    const k=dateKey(d); const val=totals[i];
    const barH=maxBar>0?Math.max((val/maxBar)*outerH,val>0?3:0):0;
    const isToday=k===todayKey(); const met=val>=goal;
    return(
      <div key={k} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
        <span style={{fontSize:7,color:C.soft}}>{val>0?fmtMl(val):''}</span>
        <div style={{width:'100%',background:C.bg3,borderRadius:'4px 4px 2px 2px',display:'flex',alignItems:'flex-end',height:outerH}}>
          <div style={{width:'100%',height:barH,borderRadius:'4px 4px 2px 2px',
            background:met?`linear-gradient(180deg,#7ef7c0,${C.green})`:isToday?`linear-gradient(180deg,${C.accent2},${C.accent})`:`linear-gradient(180deg,${C.dim},#1a3352)`,
            boxShadow:met?'0 0 6px rgba(62,184,122,.3)':isToday?'0 0 8px rgba(75,163,227,.35)':'none',
            transition:'height .6s cubic-bezier(.4,0,.2,1)'}}/>
        </div>
        <span style={{fontSize:9,color:isToday?C.accent2:C.soft,textTransform:'uppercase',letterSpacing:'.04em',lineHeight:1}}>
          {showNum?d.getDate():DAYS[d.getDay()]}
        </span>
      </div>
    );
  });

  const todayLogArr=[...(logs[todayKey()]||[])].reverse();
  const selStyle={background:C.bg3,border:`1px solid ${C.dim}`,color:C.accent2,borderRadius:7,padding:'5px 8px',fontSize:12,fontFamily:'inherit'};
  const rowStyle=(last)=>({display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px 16px',borderBottom:last?'none':`1px solid ${C.bg3}`,gap:10});

  return(
    <div style={{background:C.bg,height:'100dvh',display:'flex',flexDirection:'column',fontFamily:"'Helvetica Neue',Arial,sans-serif",fontWeight:300,color:'#cce7ff',overflow:'hidden',position:'relative'}}>
      <div style={{position:'absolute',inset:0,backgroundImage:'linear-gradient(rgba(75,163,227,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(75,163,227,.04) 1px,transparent 1px)',backgroundSize:'40px 40px',pointerEvents:'none',zIndex:0}}/>

      <nav style={{display:'flex',borderBottom:`1px solid ${C.dim}`,background:C.bg,zIndex:10,flexShrink:0,paddingTop:'env(safe-area-inset-top,0px)'}}>
        {[['today','Hoy'],['history','Historial'],['settings','Ajustes']].map(([id,lbl])=>(
          <div key={id} onClick={()=>setTab(id)}
            style={{flex:1,padding:'13px 0 11px',textAlign:'center',fontSize:10,letterSpacing:'.13em',textTransform:'uppercase',
              color:tab===id?C.accent2:C.soft,cursor:'pointer',
              borderBottom:tab===id?`2px solid ${C.accent2}`:'2px solid transparent',marginBottom:-1,userSelect:'none'}}>
            {lbl}
          </div>
        ))}
      </nav>

      {/* HOY */}
      {tab==='today'&&(
        <div style={{display:'flex',flexDirection:'column',flex:1,overflowY:'auto',zIndex:1,paddingBottom:'env(safe-area-inset-bottom,0px)'}}>
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',padding:'0 20px 28px'}}>
            <div style={{marginTop:22,marginBottom:2,lineHeight:1,textAlign:'center'}}>
              <span style={{fontFamily:"Georgia,serif",fontSize:32,color:C.white,letterSpacing:'-.02em'}}>H2</span>
              <span style={{fontFamily:"Georgia,serif",fontSize:32,color:C.accent2,fontStyle:'italic',letterSpacing:'-.01em'}}>Go!</span>
            </div>
            <div style={{fontSize:9,letterSpacing:'.25em',textTransform:'uppercase',color:C.soft,marginBottom:10}}>· hidratación diaria ·</div>
            <div style={{fontSize:11,color:C.soft,letterSpacing:'.12em',textTransform:'uppercase',marginBottom:10}}>{fmtDate(new Date())}</div>

            <div style={{position:'relative',width:186,height:186,margin:'6px auto 4px',flexShrink:0}}>
              <svg width="186" height="186" viewBox="0 0 186 186" style={{transform:'rotate(-90deg)'}}>
                <circle cx="93" cy="93" r="80" fill="none" stroke={C.dim} strokeWidth="9"/>
                <circle cx="93" cy="93" r="80" fill="none" stroke={ringColor} strokeWidth="9"
                  strokeDasharray={CIRC} strokeDashoffset={offset} strokeLinecap="round"
                  style={{filter:'drop-shadow(0 0 5px rgba(75,163,227,.45))',transition:'stroke-dashoffset .6s cubic-bezier(.4,0,.2,1),stroke .4s'}}/>
              </svg>
              <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
                <span style={{fontFamily:"Georgia,serif",fontSize:36,color:C.white,lineHeight:1,letterSpacing:'-.03em'}}>{totalLbl}</span>
                {unitLbl&&<span style={{fontSize:10,color:C.soft,letterSpacing:'.1em',textTransform:'uppercase',marginTop:2}}>{unitLbl}</span>}
                <span style={{fontSize:10,color:C.dim,marginTop:3}}>/ {goal} ml</span>
              </div>
            </div>

            <div style={{display:'inline-block',background:pct>=1?'rgba(62,184,122,.2)':C.bg3,border:`1px solid ${C.dim}`,borderRadius:20,padding:'4px 14px',fontSize:11,color:pct>=1?C.green:C.accent2,letterSpacing:'.08em',marginBottom:20}}>
              {Math.round(pct*100)}% del objetivo
            </div>

            <div style={{display:'flex',gap:10,width:'100%',justifyContent:'center',marginBottom:20}}>
              {vessels.map(({ml,label,Comp,w,h},i)=>(
                <button key={ml} onClick={()=>addDrink(ml,i)}
                  style={{flex:1,maxWidth:100,display:'flex',flexDirection:'column',alignItems:'center',gap:8,
                    background:flash===i?C.bg3:C.bg2,border:`1px solid ${flash===i?C.accent:C.dim}`,
                    borderRadius:16,padding:'14px 8px 12px',cursor:'pointer',outline:'none',
                    transform:flash===i?'scale(.92)':'scale(1)',transition:'background .15s,transform .12s,border-color .15s'}}>
                  <div style={{width:w,height:h,flexShrink:0}}><Comp/></div>
                  <span style={{fontFamily:"Georgia,serif",fontSize:15,color:C.accent2,lineHeight:1}}>{ml}</span>
                  <span style={{fontSize:9,color:C.soft,letterSpacing:'.08em',textTransform:'uppercase',marginTop:-3}}>{label}</span>
                </button>
              ))}
            </div>

            <div style={{fontSize:9,letterSpacing:'.2em',textTransform:'uppercase',color:C.soft,marginBottom:8,alignSelf:'flex-start'}}>Registro de hoy</div>
            <div style={{width:'100%',display:'flex',flexDirection:'column',gap:5}}>
              {todayLogArr.length===0
                ?<div style={{fontSize:12,color:C.dim,textAlign:'center',padding:'10px 0'}}>Aún no has registrado nada hoy.</div>
                :todayLogArr.map((e,ri)=>{
                    const realIdx=(logs[todayKey()]||[]).length-1-ri;
                    return(
                      <div key={ri} style={{display:'flex',alignItems:'center',background:C.bg2,border:`1px solid ${C.bg3}`,borderRadius:10,padding:'9px 12px'}}>
                        <span style={{fontSize:11,color:C.soft,minWidth:40}}>{e.time}</span>
                        <span style={{fontFamily:"Georgia,serif",fontSize:14,color:C.accent2,flex:1,textAlign:'right',marginRight:8}}>+{e.ml} ml</span>
                        <button style={{background:'none',border:'none',color:C.dim,fontSize:13,cursor:'pointer',padding:0}} onClick={()=>deleteEntry(realIdx)}>✕</button>
                      </div>
                    );
                  })
              }
            </div>
          </div>
        </div>
      )}

      {/* HISTORIAL */}
      {tab==='history'&&(
        <div style={{display:'flex',flexDirection:'column',flex:1,overflowY:'auto',zIndex:1,paddingBottom:'env(safe-area-inset-bottom,0px)'}}>
          <div style={{padding:'20px 18px',display:'flex',flexDirection:'column',gap:18}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div style={{fontFamily:"Georgia,serif",fontSize:24,color:C.white}}>Historial</div>
              <div style={{display:'flex',background:C.bg3,borderRadius:20,padding:2}}>
                {[['week','Semana'],['month','Mes']].map(([m,l])=>(
                  <button key={m} onClick={()=>setHistMode(m)}
                    style={{fontSize:10,letterSpacing:'.1em',textTransform:'uppercase',padding:'5px 12px',borderRadius:16,border:'none',cursor:'pointer',background:histMode===m?C.accent2:'transparent',color:histMode===m?C.bg:C.soft,fontFamily:'inherit'}}>
                    {l}
                  </button>
                ))}
              </div>
            </div>

            {histMode==='week'&&(()=>{
              const wd=getWeekDays(); const wt=wd.map(d=>(logs[dateKey(d)]||[]).reduce((s,e)=>s+e.ml,0));
              const mx=Math.max(goal,...wt,1); const {avg,best,daysOk}=calcStats(wt);
              const mon=wd[0],sun=wd[6];
              return(<React.Fragment>
                <div style={{textAlign:'center',fontSize:12,color:C.accent2}}>{mon.getDate()} – {sun.getDate()} de {MONTHS[sun.getMonth()]}</div>
                <div style={{background:C.bg2,border:`1px solid ${C.dim}`,borderRadius:18,padding:'16px 10px 10px'}}>
                  <div style={{display:'flex',alignItems:'flex-end',gap:4,height:150}}>{renderBars(wd,wt,mx,110,false)}</div>
                  <div style={{display:'flex',alignItems:'center',gap:6,marginTop:10,paddingTop:8,borderTop:`1px solid ${C.bg3}`}}>
                    <div style={{width:7,height:7,borderRadius:'50%',background:C.green,flexShrink:0}}/>
                    <span style={{fontSize:9,color:C.soft}}>Objetivo: {goal} ml</span>
                  </div>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                  {[['Media diaria',fmtMl(avg),'esta semana'],['Mejor día',fmtMl(best),'esta semana'],
                    ['Racha',streak+' días','objetivo seguido'],['Días objetivo',`${daysOk}/7`,'esta semana']
                  ].map(([lbl,val,sub])=>(
                    <div key={lbl} style={{background:C.bg2,border:`1px solid ${C.dim}`,borderRadius:14,padding:14}}>
                      <div style={{fontSize:8,letterSpacing:'.15em',textTransform:'uppercase',color:C.soft,marginBottom:5}}>{lbl}</div>
                      <div style={{fontFamily:"Georgia,serif",fontSize:22,color:C.white,lineHeight:1}}>{val}</div>
                      <div style={{fontSize:9,color:C.soft,marginTop:3}}>{sub}</div>
                    </div>
                  ))}
                </div>
              </React.Fragment>);
            })()}

            {histMode==='month'&&(()=>{
              const prevM=()=>setMonthRef(r=>{const d=new Date(r.y,r.m-1,1);return{y:d.getFullYear(),m:d.getMonth()};});
              const nextM=()=>setMonthRef(r=>{const now=new Date();if(r.y===now.getFullYear()&&r.m===now.getMonth())return r;const d=new Date(r.y,r.m+1,1);return{y:d.getFullYear(),m:d.getMonth()};});
              const mdays=getMonthDays(monthRef.y,monthRef.m);
              const mt=mdays.map(d=>(logs[dateKey(d)]||[]).reduce((s,e)=>s+e.ml,0));
              const mx=Math.max(goal,...mt,1); const {avg,best,daysOk}=calcStats(mt);
              const totalMo=mt.reduce((a,b)=>a+b,0);
              return(<React.Fragment>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <button onClick={prevM} style={{background:'none',border:`1px solid ${C.dim}`,borderRadius:8,color:C.soft,fontSize:16,cursor:'pointer',padding:'4px 12px',lineHeight:1}}>‹</button>
                  <span style={{fontFamily:"Georgia,serif",fontSize:14,color:C.accent2,flex:1,textAlign:'center'}}>{MONTHS[monthRef.m]} {monthRef.y}</span>
                  <button onClick={nextM} style={{background:'none',border:`1px solid ${C.dim}`,borderRadius:8,color:C.soft,fontSize:16,cursor:'pointer',padding:'4px 12px',lineHeight:1}}>›</button>
                </div>
                <div style={{background:C.bg2,border:`1px solid ${C.dim}`,borderRadius:18,padding:'16px 6px 10px'}}>
                  <div style={{display:'flex',alignItems:'flex-end',gap:2,height:130}}>{renderBars(mdays,mt,mx,100,true)}</div>
                  <div style={{display:'flex',alignItems:'center',gap:6,marginTop:10,paddingTop:8,borderTop:`1px solid ${C.bg3}`}}>
                    <div style={{width:7,height:7,borderRadius:'50%',background:C.green,flexShrink:0}}/>
                    <span style={{fontSize:9,color:C.soft}}>Objetivo: {goal} ml/día</span>
                  </div>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                  {[['Total del mes',fmtMl(totalMo),MONTHS_SHORT[monthRef.m]+' '+monthRef.y],
                    ['Media diaria',fmtMl(avg),'por día registrado'],
                    ['Mejor día',fmtMl(best),'del mes'],
                    ['Días objetivo',`${daysOk}/${mdays.length}`,'conseguidos']
                  ].map(([lbl,val,sub])=>(
                    <div key={lbl} style={{background:C.bg2,border:`1px solid ${C.dim}`,borderRadius:14,padding:14}}>
                      <div style={{fontSize:8,letterSpacing:'.15em',textTransform:'uppercase',color:C.soft,marginBottom:5}}>{lbl}</div>
                      <div style={{fontFamily:"Georgia,serif",fontSize:22,color:C.white,lineHeight:1}}>{val}</div>
                      <div style={{fontSize:9,color:C.soft,marginTop:3}}>{sub}</div>
                    </div>
                  ))}
                </div>
              </React.Fragment>);
            })()}
          </div>
        </div>
      )}

      {/* AJUSTES */}
      {tab==='settings'&&(
        <div style={{display:'flex',flexDirection:'column',flex:1,overflowY:'auto',zIndex:1,paddingBottom:'env(safe-area-inset-bottom,0px)'}}>
          <div style={{padding:'20px 18px',display:'flex',flexDirection:'column',gap:18}}>
            <div style={{fontFamily:"Georgia,serif",fontSize:24,color:C.white}}>Ajustes</div>

            <div style={{background:C.bg2,border:`1px solid ${C.dim}`,borderRadius:16,overflow:'hidden'}}>
              <div style={rowStyle(true)}>
                <div style={{flex:1}}>
                  <strong style={{display:'block',fontSize:13,color:C.white,marginBottom:2,fontWeight:400}}>Objetivo diario</strong>
                  <span style={{fontSize:10,color:C.soft}}>Mililitros recomendados</span>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <input type="range" min="1000" max="4000" step="250" value={goal}
                    onChange={e=>{const v=parseInt(e.target.value);setGoal(v);persist('h2go_goal',v);}}
                    style={{width:80,accentColor:C.accent}}/>
                  <span style={{fontFamily:"Georgia,serif",fontSize:14,color:C.accent2,minWidth:56,textAlign:'right'}}>{goal} ml</span>
                </div>
              </div>
            </div>

            <div style={{background:C.bg2,border:`1px solid ${C.dim}`,borderRadius:16,overflow:'hidden'}}>
              <div style={rowStyle(!remindOn)}>
                <div style={{flex:1}}>
                  <strong style={{display:'block',fontSize:13,color:C.white,marginBottom:2,fontWeight:400}}>Recordatorios</strong>
                  <span style={{fontSize:10,color:C.soft}}>Avisos para beber agua</span>
                </div>
                <input type="checkbox" checked={remindOn}
                  onChange={e=>{setRemindOn(e.target.checked);persist('h2go_remind',e.target.checked?'1':'0');}}
                  style={{width:18,height:18,accentColor:C.accent}}/>
              </div>
              {remindOn&&(<React.Fragment>
                <div style={rowStyle(false)}>
                  <div style={{flex:1}}><strong style={{display:'block',fontSize:13,color:C.white,marginBottom:2,fontWeight:400}}>Cada cuánto</strong><span style={{fontSize:10,color:C.soft}}>Intervalo entre avisos</span></div>
                  <select value={remindInt} style={selStyle} onChange={e=>{setRemindInt(parseInt(e.target.value));persist('h2go_interval',e.target.value);}}>
                    <option value="30">30 min</option><option value="60">1 hora</option>
                    <option value="90">1h 30min</option><option value="120">2 horas</option>
                  </select>
                </div>
                <div style={rowStyle(false)}>
                  <div style={{flex:1}}><strong style={{display:'block',fontSize:13,color:C.white,marginBottom:2,fontWeight:400}}>Despertar L–V</strong><span style={{fontSize:10,color:C.soft}}>Primer aviso entre semana</span></div>
                  <select value={wakeWd} style={selStyle} onChange={e=>{setWakeWd(parseInt(e.target.value));persist('h2go_wakewd',e.target.value);}}>
                    {[6,7,8,9,10,11].map(h=><option key={h} value={h}>{h}:00</option>)}
                  </select>
                </div>
                <div style={rowStyle(true)}>
                  <div style={{flex:1}}><strong style={{display:'block',fontSize:13,color:C.white,marginBottom:2,fontWeight:400}}>Despertar Sáb–Dom</strong><span style={{fontSize:10,color:C.soft}}>Primer aviso en fin de semana</span></div>
                  <select value={wakeWe} style={selStyle} onChange={e=>{setWakeWe(parseInt(e.target.value));persist('h2go_wakewe',e.target.value);}}>
                    {[8,9,10,11,12,13].map(h=><option key={h} value={h}>{h}:00</option>)}
                  </select>
                </div>
              </React.Fragment>)}
            </div>

            {remindOn&&(
              <div style={{fontSize:10,color:C.soft,lineHeight:1.7,background:C.bg2,border:`1px solid ${C.bg3}`,borderRadius:12,padding:'11px 14px'}}>
                Los recordatorios se silencian entre las <strong style={{color:C.accent2}}>22:00</strong> y tu hora de despertar, y también en cuanto <strong style={{color:C.accent2}}>alcanzas el objetivo del día</strong>.
              </div>
            )}

            <button onClick={()=>{ if(window.confirm('¿Reiniciar los datos de hoy?')){ const next={...logs}; delete next[todayKey()]; saveLogs(next); showToast('Datos de hoy reiniciados'); } }}
              style={{width:'100%',background:'none',border:'1px solid #4a2020',borderRadius:12,color:'#c07070',padding:13,fontSize:12,letterSpacing:'.08em',cursor:'pointer',fontFamily:'inherit'}}>
              Reiniciar datos de hoy
            </button>

            <div style={{marginTop:4,textAlign:'center',paddingBottom:8}}>
              <div style={{fontSize:9,color:C.dim,letterSpacing:'.14em',textTransform:'uppercase',marginBottom:5}}>Desarrollado por</div>
              <div style={{fontSize:12,color:C.soft,letterSpacing:'.06em',marginBottom:6}}>@mellamanjuanjo</div>
              <a href="mailto:juanjolopezortego@me.com" title="Escribir un correo"
                style={{fontSize:10,color:C.dim,textDecoration:'none',letterSpacing:'.04em',
                  borderBottom:'1px dotted #2a4a6e',paddingBottom:1,
                  filter:'blur(3px)',transition:'filter .25s',cursor:'pointer',display:'inline-block'}}
                onMouseEnter={e=>e.currentTarget.style.filter='blur(0)'}
                onMouseLeave={e=>e.currentTarget.style.filter='blur(3px)'}
                onTouchStart={e=>{ e.currentTarget.style.filter='blur(0)'; setTimeout(()=>{ try{e.currentTarget.style.filter='blur(3px)'}catch(x){} },3500); }}>
                juanjolopezortego@me.com
              </a>
              <div style={{fontSize:8,color:C.dim,marginTop:5,letterSpacing:'.08em'}}>Toca el email para revelarlo</div>
            </div>
          </div>
        </div>
      )}

      <div style={{position:'fixed',bottom:20,left:'50%',transform:`translateX(-50%) translateY(${toastVis?0:80}px)`,background:C.accent,color:C.bg,fontSize:12,fontWeight:500,letterSpacing:'.06em',padding:'9px 18px',borderRadius:20,zIndex:200,opacity:toastVis?1:0,transition:'transform .3s,opacity .3s',whiteSpace:'nowrap',pointerEvents:'none'}}>
        {toast}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<H2Go/>);
</script>
</body>
</html>
